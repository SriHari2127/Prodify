<!-- ===== COMPLETE INTEGRATION EXAMPLE ===== -->
<!-- Full example showing complete integration -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodify - AI Study Coach</title>
    
    <!-- Your existing stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- AI Coach CSS -->
    <link rel="stylesheet" href="js/ai-coach/ai-coach.css">
</head>
<body>
    <!-- Your existing navigation -->
    <nav>
        <button data-tab="dashboard">Dashboard</button>
        <button data-tab="tasks">Tasks</button>
        <button data-tab="habits">Habits</button>
        <button data-tab="ai-coach" id="aiCoachTabButton">🤖 AI Coach</button>
    </nav>
    
    <!-- Your existing tabs -->
    <div id="dashboard-tab" class="tab-content">
        <!-- Dashboard content -->
    </div>
    
    <div id="tasks-tab" class="tab-content" style="display: none;">
        <!-- Tasks content -->
    </div>
    
    <div id="habits-tab" class="tab-content" style="display: none;">
        <!-- Habits content -->
    </div>
    
    <!-- AI Coach Tab -->
    <div id="ai-coach-tab" class="tab-content" style="display: none;">
        <div id="aiCoachDashboard"></div>
    </div>
    
    <!-- Your existing scripts -->
    <script src="js/core/data.js"></script>
    <script src="js/core/ui.js"></script>
    <!-- ... other scripts ... -->
    
    <!-- AI Coach Scripts (load after core scripts) -->
    <script src="js/ai-coach/behaviorAnalyzer.js"></script>
    <script src="js/ai-coach/weakSubjectDetector.js"></script>
    <script src="js/ai-coach/productivityPredictor.js"></script>
    <script src="js/ai-coach/examPreparationAdvisor.js"></script>
    <script src="js/ai-coach/studyPatternAnalyzer.js"></script>
    <script src="js/ai-coach/motivationGenerator.js"></script>
    <script src="js/ai-coach/studyRecommendationEngine.js"></script>
    <script src="js/ai-coach/aiCoachEngine.js"></script>
    <script src="js/ai-coach/coachUIRenderer.js"></script>
    <script src="js/ai-coach/testDataGenerator.js"></script>
    
    <!-- Tab switching logic -->
    <script>
        // Handle tab switching
        document.querySelectorAll('[data-tab]').forEach(button => {
            button.addEventListener('click', function() {
                const tabName = this.getAttribute('data-tab');
                
                // Hide all tabs
                document.querySelectorAll('.tab-content').forEach(tab => {
                    tab.style.display = 'none';
                });
                
                // Show selected tab
                const selectedTab = document.getElementById(tabName + '-tab');
                if (selectedTab) {
                    selectedTab.style.display = 'block';
                    
                    // If AI Coach tab, render dashboard
                    if (tabName === 'ai-coach') {
                        CoachUIRenderer.renderDashboard();
                    }
                }
                
                // Update active button
                document.querySelectorAll('[data-tab]').forEach(btn => {
                    btn.classList.remove('active');
                });
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
